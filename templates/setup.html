<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração Inicial — Siqueirão</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#1f2937,#374151); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { background:white; border-radius:16px; padding:40px; max-width:440px; width:90%; box-shadow:0 25px 50px rgba(0,0,0,0.3); }
        h2 { font-size:1.4rem; color:#1f2937; margin-bottom:6px; }
        p { color:#6b7280; font-size:0.9rem; margin-bottom:24px; }
        .badge-setup { background:#dbeafe; color:#1e40af; padding:4px 12px; border-radius:20px; font-size:0.78rem; font-weight:600; display:inline-block; margin-bottom:20px; }
        .form-group { margin-bottom:16px; }
        label { display:block; font-size:0.875rem; font-weight:500; color:#374151; margin-bottom:5px; }
        input { width:100%; padding:11px 14px; border:1.5px solid #e5e7eb; border-radius:10px; font-size:0.95rem; font-family:inherit; outline:none; }
        input:focus { border-color:#2563eb; }
        .btn { width:100%; padding:13px; background:#2563eb; color:white; border:none; border-radius:10px; font-size:1rem; font-weight:600; font-family:inherit; cursor:pointer; margin-top:8px; }
        .btn:hover { background:#1d4ed8; }
        .erro { background:#fee2e2; color:#991b1b; border-radius:8px; padding:10px 14px; font-size:0.875rem; margin-bottom:16px; }
    </style>
</head>
<body>
    <div class="box">
        <span class="badge-setup"><i class="fas fa-cog"></i> Configuração Inicial</span>
        <h2>Criar Administrador</h2>
        <p>Nenhum usuário encontrado. Crie o primeiro acesso ao sistema.</p>

        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/setup">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" name="nome" placeholder="Seu nome" required autofocus>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" name="email" placeholder="admin@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <button type="submit" class="btn"><i class="fas fa-check"></i> Criar administrador</button>
        </form>
    </div>
</body>
</html>
