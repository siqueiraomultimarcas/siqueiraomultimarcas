{% extends "base.html" %}

{% block title %}Abastecimentos - Locadora{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="fas fa-gas-pump"></i> Controle de Abastecimentos</h1>
    <button class="btn btn-primary" onclick="abrirModalAbastecimento()">
        <i class="fas fa-plus"></i> Novo Abastecimento
    </button>
</div>

<!-- Stats -->
<div class="stats-grid" style="margin-bottom: 20px;">
    <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-tint"></i></div>
        <div class="stat-info">
            <h3 id="totalLitros">0 L</h3>
            <p>Total de Litros</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-dollar-sign"></i></div>
        <div class="stat-info">
            <h3 id="totalGasto">R$ 0,00</h3>
            <p>Total Gasto</p>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon orange"><i class="fas fa-percentage"></i></div>
        <div class="stat-info">
            <h3 id="mediaPreco">R$ 0,00/L</h3>
            <p>Média Preço/Litro</p>
        </div>
    </div>
</div>

<!-- Filtros -->
<div class="card">
    <div class="toolbar">
        <select class="form-control" id="filtroVeiculoAbast" onchange="filtrarAbastecimentos()" style="width: 200px;">
            <option value="todos">Todos os Veículos</option>
        </select>
        <input type="date" class="form-control" id="filtroDataAbast" onchange="filtrarAbastecimentos()" style="width: 150px;">
    </div>
</div>

<!-- Tabela de Abastecimentos -->
<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Veículo</th>
                    <th>Litros</th>
                    <th>Preço/Litro</th>
                    <th>Total</th>
                    <th>Km</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaAbastecimentos">
                <tr><td colspan="7" style="text-align:center">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let abastecimentos = [];
    let veiculos = [];

    // Carregar dados
    async function carregarDados() {
        try {
            const [respAbast, respVeic] = await Promise.all([
                fetch('/api/abastecimentos'),
                fetch('/api/veiculos')
            ]);
            abastecimentos = await respAbast.json();
            veiculos = await respVeic.json();

            // Preencher filtro de veículos
            const selectVeic = document.getElementById('filtroVeiculoAbast');
            veiculos.forEach(v => {
                selectVeic.innerHTML += `<option value="${v.id}">${v.placa} - ${v.marca} ${v.modelo}</option>`;
            });

            atualizarEstatisticas();
            renderizarAbastecimentos(abastecimentos);
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
        }
    }

    function atualizarEstatisticas() {
        const totalLitros = abastecimentos.reduce((sum, a) => sum + (parseFloat(a.litros) || 0), 0);
        const totalGasto = abastecimentos.reduce((sum, a) => sum + (parseFloat(a.total) || 0), 0);
        const mediaPreco = totalLitros > 0 ? totalGasto / totalLitros : 0;

        document.getElementById('totalLitros').textContent = totalLitros.toFixed(2) + ' L';
        document.getElementById('totalGasto').textContent = formatCurrency(totalGasto);
        document.getElementById('mediaPreco').textContent = 'R$ ' + mediaPreco.toFixed(2) + '/L';
    }

    function renderizarAbastecimentos(lista) {
        const tbody = document.getElementById('tabelaAbastecimentos');
        if (lista.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">Nenhum abastecimento encontrado</td></tr>';
            return;
        }

        tbody.innerHTML = lista.map(a => {
            const data = formatDate(a.data_abastecimento);
            const veiculo = (a.placa || '-') + ' - ' + (a.marca || '') + ' ' + (a.modelo || '');
            const litros = parseFloat(a.litros).toFixed(2) + ' L';
            const precoLitro = formatCurrency(a.valor_litro);
            const total = formatCurrency(a.total);
            const km = a.km_abastecimento ? a.km_abastecimento.toLocaleString() + ' km' : '-';
            return `
            <tr>
                <td>${data}</td>
                <td>${veiculo}</td>
                <td>${litros}</td>
                <td>${precoLitro}</td>
                <td><strong>${total}</strong></td>
                <td>${km}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="editarAbastecimento(${a.id})" title="Editar">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="excluirAbastecimento(${a.id})" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    function filtrarAbastecimentos() {
        const veiculo = document.getElementById('filtroVeiculoAbast').value;
        const data = document.getElementById('filtroDataAbast').value;

        const filtrados = abastecimentos.filter(a => {
            const matchVeiculo = veiculo === 'todos' || a.veiculo_id == veiculo;
            const matchData = !data || (a.data_abastecimento && a.data_abastecimento.startsWith(data));
            return matchVeiculo && matchData;
        });

        renderizarAbastecimentos(filtrados);
    }

    function abrirModalAbastecimento(abastecimentoId) {
        // Options de veículos
        let optionsVeiculos = '<option value="">Selecione o veículo</option>';
        veiculos.forEach(v => {
            optionsVeiculos += `<option value="${v.id}" data-km="${v.km_atual}">${v.placa} - ${v.marca} ${v.modelo}</option>`;
        });

        const isEdicao = !!abastecimentoId;
        const titulo = isEdicao ? 'Editar Abastecimento' : 'Novo Abastecimento';
        const textoBotao = isEdicao ? 'Salvar' : 'Cadastrar';

        const content = `
            <form id="formAbastecimento" onsubmit="salvarAbastecimento(event)">
                <input type="hidden" id="abastecimentoId" value="${abastecimentoId || ''}">
                <div class="grid-2">
                    <div class="form-group">
                        <label>Veículo *</label>
                        <select class="form-control" name="veiculo_id" id="selectVeiculoAbast" required onchange="atualizarKm()">
                            ${optionsVeiculos}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data do Abastecimento</label>
                        <input type="date" class="form-control" name="data_abastecimento" id="dataAbastecimento" value="${new Date().toISOString().split('T')[0]}">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Quantidade (Litros)</label>
                        <input type="number" class="form-control" name="litros" id="litros" step="0.01" min="0" required onchange="calcularTotalAbast()">
                    </div>
                    <div class="form-group">
                        <label>Preço por Litro (R$)</label>
                        <input type="number" class="form-control" name="valor_litro" id="valorLitro" step="0.001" min="0" onchange="calcularTotalAbast()">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Km do Abastecimento</label>
                        <input type="number" class="form-control" name="km_abastecimento" id="kmAbastecimento" min="0">
                    </div>
                    <div class="form-group">
                        <label>Total</label>
                        <div id="totalAbast" style="font-size: 1.5rem; font-weight: bold; color: #2563eb;">R$ 0,00</div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()" style="margin-right: 10px;">Cancelar</button>
                    <button type="submit" class="btn btn-primary">${textoBotao}</button>
                </div>
            </form>
        `;
        abrirModal(titulo, content);
    }

    function editarAbastecimento(id) {
        const abast = abastecimentos.find(a => a.id === id);
        if (!abast) return;

        abrirModalAbastecimento(id);

        // Preencher campos após o modal ser renderizado
        setTimeout(() => {
            const selectVeic = document.getElementById('selectVeiculoAbast');
            if (selectVeic) selectVeic.value = abast.veiculo_id;

            const dataInput = document.getElementById('dataAbastecimento');
            if (dataInput && abast.data_abastecimento) {
                dataInput.value = abast.data_abastecimento.split('T')[0];
            }

            const litrosInput = document.getElementById('litros');
            if (litrosInput) litrosInput.value = abast.litros;

            const valorLitroInput = document.getElementById('valorLitro');
            if (valorLitroInput) valorLitroInput.value = abast.valor_litro;

            const kmInput = document.getElementById('kmAbastecimento');
            if (kmInput) kmInput.value = abast.km_abastecimento || '';

            calcularTotalAbast();
        }, 50);
    }

    function atualizarKm() {
        const select = document.getElementById('selectVeiculoAbast');
        const option = select.options[select.selectedIndex];
        const km = option.dataset.km || 0;
        document.getElementById('kmAbastecimento').value = km;
    }

    function calcularTotalAbast() {
        const litros = parseFloat(document.getElementById('litros').value) || 0;
        const preco = parseFloat(document.getElementById('valorLitro').value) || 0;
        const total = litros * preco;
        document.getElementById('totalAbast').textContent = formatCurrency(total);
    }

    async function salvarAbastecimento(e) {
        e.preventDefault();
        const form = document.getElementById('formAbastecimento');
        const formData = new FormData(form);
        const data = Object.fromEntries(formData);
        const abastecimentoId = document.getElementById('abastecimentoId').value;

        // Converter valores
        if (data.veiculo_id) data.veiculo_id = parseInt(data.veiculo_id);
        if (data.litros) data.litros = parseFloat(data.litros);
        if (data.valor_litro) data.valor_litro = parseFloat(data.valor_litro);
        if (data.km_abastecimento) data.km_abastecimento = parseInt(data.km_abastecimento);

        try {
            const url = abastecimentoId ? `/api/abastecimentos/${abastecimentoId}` : '/api/abastecimentos';
            const method = abastecimentoId ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                fecharModal();
                showToast('Abastecimento registrado com sucesso!', 'success');
                carregarDados();
            } else {
                showToast('Erro ao salvar abastecimento', 'error');
            }
        } catch (error) {
            console.error('Erro:', error);
            showToast('Erro ao salvar abastecimento', 'error');
        }
    }

    async function _confirmaExcluirAbastecimento(id) {
        try {
            const response = await fetch(`/api/abastecimentos/${id}`, { method: 'DELETE' });
            if (response.ok) {
                showToast('Abastecimento excluído', 'success');
            } else {
                showToast('Erro ao excluir abastecimento', 'error');
            }
            carregarDados();
        } catch (error) {
            console.error('Erro:', error);
            showToast('Erro ao excluir abastecimento', 'error');
        }
    }

    function excluirAbastecimento(id) {
        confirmarAcao('Excluir Abastecimento', 'Deseja excluir este abastecimento?', () => _confirmaExcluirAbastecimento(id));
    }

    window.addEventListener('load', carregarDados);
</script>
{% endblock %}
