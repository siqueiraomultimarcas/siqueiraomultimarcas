<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Siqueirão Multimarcas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f2937 0%, #374151 50%, #1f2937 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-logo img {
            max-width: 220px;
            height: auto;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            font-size: 1.5rem;
            color: #1f2937;
            margin-bottom: 6px;
        }
        .login-box p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.875rem;
            color: #374151;
            margin-bottom: 6px;
        }
        .input-icon {
            position: relative;
        }
        .input-icon i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 0.9rem;
        }
        .input-icon input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        .input-icon input:focus {
            border-color: #2563eb;
        }
        .row-lembrar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 0.875rem;
            color: #6b7280;
        }
        .row-lembrar input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #2563eb;
            cursor: pointer;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-login:hover {
            background: #1d4ed8;
        }
        .erro {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.875rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .footer-login {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <img src="/static/logo_nova.png" alt="Siqueirão Multimarcas" onerror="this.style.display='none'">
        </div>

        <div class="login-box">
            <h2>Bem-vindo de volta</h2>
            <p>Faça login para acessar o sistema</p>

            {% if erro %}
            <div class="erro">
                <i class="fas fa-exclamation-circle"></i> {{ erro }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>CPF / Login</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" name="email" placeholder="CPF ou e-mail" required autofocus autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="senha" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="row-lembrar">
                    <input type="checkbox" name="lembrar" id="lembrar">
                    <label for="lembrar" style="cursor:pointer">Manter conectado</label>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
        </div>

        <div class="footer-login">
            Siqueirão Multimarcas &mdash; Sistema de Gestão
        </div>
    </div>
</body>
</html>
